<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$GROVE — Grove Street Memecoin</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

    :root {
      --orange: #ff6600;
      --dark-orange: #cc4400;
      --yellow: #ffcc00;
      --black: #0a0a0a;
    }

    html, body {
      height: 100%; overflow: hidden;
    }

    body {
      background: url('bg.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Oswald', 'Impact', 'Arial Black', sans-serif;
      color: #fff;
    }

    /* Dark overlay */
    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 0;
    }

    /* Scanlines */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }

    /* Vignette */
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
    }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; pointer-events: none; z-index: 99999;
      width: 44px; height: 44px;
      transform: translate(-50%, -50%);
      transition: transform 0.08s;
      will-change: left, top;
    }
    #cursor.click { transform: translate(-50%, -50%) scale(0.75); }

    /* ── GUNSHOT ── */
    .shot-flash {
      position: fixed; pointer-events: none; z-index: 99998;
      transform: translate(-50%, -50%);
      animation: shotFlash 0.35s ease-out forwards;
    }
    @keyframes shotFlash {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.2); }
      25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(2.2); }
    }

    .bullet-hole {
      position: fixed; pointer-events: none; z-index: 99996;
      transform: translate(-50%, -50%);
      animation: holeFade 4s ease-out forwards;
    }
    @keyframes holeFade {
      0%,70% { opacity: 1; }
      100%   { opacity: 0; }
    }

    .spark {
      position: fixed; pointer-events: none; z-index: 99997;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--orange);
      transform: translate(-50%, -50%);
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 30px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    }

    .ticker {
      font-size: 30px; letter-spacing: 3px;
      color: var(--orange);
      text-shadow: 0 0 14px var(--orange), 3px 3px 0 #000;
      animation: tickGlow 2.4s ease-in-out infinite;
    }
    @keyframes tickGlow {
      0%,100% { text-shadow: 0 0 12px var(--orange), 3px 3px 0 #000; }
      50%      { text-shadow: 0 0 28px var(--orange), 0 0 50px #ff3300, 3px 3px 0 #000; }
    }

    .socials { display: flex; gap: 10px; }
    .social-btn {
      color: #fff; text-decoration: none; font-size: 13px; letter-spacing: 2px;
      padding: 7px 18px;
      border: 1.5px solid var(--orange);
      background: rgba(255,102,0,0.12);
      clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition: background 0.25s, box-shadow 0.25s, color 0.25s;
      display: flex; align-items: center; gap: 6px;
    }
    .social-btn:hover {
      background: var(--orange); color: #000;
      box-shadow: 0 0 16px var(--orange);
    }
    .social-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      gap: clamp(4px, 1.1vh, 14px);
      padding: clamp(56px,8vh,80px) clamp(12px,2vw,24px) clamp(4px,1vh,10px);
      overflow: hidden;
    }

    /* Stars */
    .stars { display: flex; gap: 5px; }
    .star {
      font-size: clamp(12px, 1.8vh, 20px); color: var(--orange);
      text-shadow: 0 0 8px var(--orange);
      animation: starBlink 1.2s step-end infinite;
    }
    .star:nth-child(2){animation-delay:.2s}
    .star:nth-child(3){animation-delay:.4s}
    .star:nth-child(4){animation-delay:.6s}
    .star:nth-child(5){animation-delay:.8s}
    @keyframes starBlink {
      0%,100%{opacity:1}50%{opacity:0.25}
    }

    .logo-title {
      font-size: clamp(36px, 9vh, 110px);
      color: var(--orange);
      letter-spacing: clamp(3px,1vw,8px); font-style: italic; line-height: 1;
      text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 0 0 40px rgba(255,102,0,0.6);
    }

    .tagline {
      font-size: clamp(9px, 1.4vh, 16px);
      color: #ddd; letter-spacing: clamp(2px,0.5vw,4px);
      text-shadow: 1px 1px 0 #000;
      text-transform: uppercase;
    }

    /* ── CA BOX ── */
    .ca-wrap { text-align: center; }
    .ca-label {
      font-size: clamp(9px, 1vh, 12px); letter-spacing: 3px; color: #888; margin-bottom: 5px;
    }
    .ca-box {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.72);
      border: 2px solid var(--orange);
      padding: clamp(7px,1vh,13px) clamp(14px,2vw,26px);
      clip-path: polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);
      cursor: pointer !important;
      transition: background 0.25s, box-shadow 0.25s;
      user-select: none;
    }
    .ca-box:hover {
      background: rgba(255,102,0,0.18);
      box-shadow: 0 0 22px rgba(255,102,0,0.5);
    }
    .ca-addr {
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 1.4vw, 14px); color: #fff; letter-spacing: 1px;
    }
    .ca-icon { font-size: clamp(14px, 1.8vh, 18px); color: var(--orange); }

    /* ── BUY BUTTON ── */
    .buy-btn {
      display: inline-block;
      padding: clamp(8px,1.2vh,15px) clamp(22px,4vw,55px);
      background: linear-gradient(135deg, var(--orange), #cc3300);
      color: #fff; font-size: clamp(14px,2.2vh,22px); letter-spacing: 4px; text-decoration: none;
      clip-path: polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);
      box-shadow: 0 0 24px rgba(255,102,0,0.7);
      animation: buyPulse 2.2s ease-in-out infinite;
      transition: transform 0.2s;
      text-transform: uppercase;
    }
    .buy-btn:hover { transform: scale(1.06); }
    @keyframes buyPulse {
      0%,100%{box-shadow:0 0 22px rgba(255,102,0,0.65)}
      50%{box-shadow:0 0 48px rgba(255,80,0,1),0 0 70px rgba(255,50,0,0.4)}
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%; max-width: 900px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), var(--yellow), var(--orange), transparent);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      text-align: center; font-size: clamp(13px, 2.2vh, 30px);
      color: var(--orange); text-shadow: 2px 2px 0 #000;
      letter-spacing: clamp(2px,0.5vw,5px);
    }

    /* ── CAROUSEL ── */
    .carousel-wrap {
      position: relative; width: 100%; overflow: hidden;
      padding: 4px 0;
    }

    /* fade edges */
    .carousel-wrap::before,
    .carousel-wrap::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 120px; z-index: 5;
      pointer-events: none;
    }
    .carousel-wrap::before {
      left: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.85), transparent);
    }
    .carousel-wrap::after {
      right: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.85), transparent);
    }

    .carousel-track {
      display: flex; gap: clamp(12px, 1.5vw, 22px);
      will-change: transform;
      user-select: none;
      align-items: flex-start;
    }

    .char-card {
      flex: 0 0 clamp(80px, 16vh, 240px);
      aspect-ratio: 1 / 1;
      border: 2px solid var(--orange);
      clip-path: polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
      overflow: hidden;
      position: relative;
      background: rgba(255,102,0,0.05);
      transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s;
    }
    .char-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 30px rgba(255,102,0,0.65);
      border-color: var(--yellow);
    }
    .char-card img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
    }

    /* Nav arrows */
    .carousel-nav {
      display: flex; justify-content: center; gap: 12px;
    }
    .carousel-arrow {
      width: clamp(30px,4vh,42px); height: clamp(30px,4vh,42px);
      background: rgba(0,0,0,0.7);
      border: 2px solid var(--orange);
      color: var(--orange);
      font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .carousel-arrow:hover {
      background: var(--orange); color: #000;
      box-shadow: 0 0 14px var(--orange);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: 50%; left: 50%;
      background: rgba(0,0,0,0.92);
      border: 2px solid var(--orange);
      color: var(--orange); padding: 14px 32px; font-size: 20px; letter-spacing: 3px;
      clip-path: polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);
      z-index: 99990;
      animation: toastPop 1.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes toastPop {
      0%   { opacity:0; transform:translate(-50%,-50%) scale(0.7); }
      15%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
      25%  { transform:translate(-50%,-50%) scale(1); }
      70%  { opacity:1; }
      100% { opacity:0; transform:translate(-50%,-55%); }
    }

    /* ── FOOTER ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      text-align: center; padding: 4px 20px;
      color: #444; font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 1px;
      pointer-events: none;
    }

    @media(max-width:600px){
      header{ padding: 10px 14px; }
      .ticker{ font-size: 20px; }
      .social-btn{ padding: 5px 10px; font-size: 11px; }
      .ca-addr{ font-size: 9px; letter-spacing: 0; }
    }
  </style>
</head>

<script>
  // ── CURSOR TRACKING ──
  const cur = document.getElementById('cursor');
  let mx = -100, my = -100;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px';
    cur.style.top  = my + 'px';
  });

  document.addEventListener('mousedown', () => cur.classList.add('click'));
  document.addEventListener('mouseup',   () => cur.classList.remove('click'));

  // ── GUNSHOT EFFECT ──
  document.addEventListener('click', e => {
    spawnShot(e.clientX, e.clientY);
  });

  function spawnShot(x, y) {
    // Muzzle flash ring
    const flash = document.createElement('div');
    flash.className = 'shot-flash';
    flash.style.left = x + 'px';
    flash.style.top  = y + 'px';
    flash.innerHTML = `
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="30" fill="none" stroke="#ff6600" stroke-width="2.5"/>
        <circle cx="32" cy="32" r="20" fill="none" stroke="#ffaa00" stroke-width="1.5"/>
        <circle cx="32" cy="32" r="6"  fill="#ffffff" opacity="0.95"/>
        <line x1="32" y1="2"  x2="32" y2="22" stroke="#ff6600" stroke-width="2"/>
        <line x1="32" y1="42" x2="32" y2="62" stroke="#ff6600" stroke-width="2"/>
        <line x1="2"  y1="32" x2="22" y2="32" stroke="#ff6600" stroke-width="2"/>
        <line x1="42" y1="32" x2="62" y2="32" stroke="#ff6600" stroke-width="2"/>
        <!-- diagonal ticks -->
        <line x1="10" y1="10" x2="16" y2="16" stroke="#ffaa00" stroke-width="1.5"/>
        <line x1="54" y1="10" x2="48" y2="16" stroke="#ffaa00" stroke-width="1.5"/>
        <line x1="10" y1="54" x2="16" y2="48" stroke="#ffaa00" stroke-width="1.5"/>
        <line x1="54" y1="54" x2="48" y2="48" stroke="#ffaa00" stroke-width="1.5"/>
      </svg>`;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 400);

    // Bullet hole
    const hole = document.createElement('div');
    hole.className = 'bullet-hole';
    hole.style.left = x + 'px';
    hole.style.top  = y + 'px';
    hole.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 18 18">
        <circle cx="9" cy="9" r="8" fill="#000" opacity="0.85"/>
        <circle cx="9" cy="9" r="5" fill="#111"/>
        <circle cx="9" cy="9" r="2.5" fill="#000"/>
        <circle cx="7" cy="7" r="1.2" fill="#2a2a2a" opacity="0.6"/>
        <!-- crack lines -->
        <line x1="9" y1="1"  x2="6" y2="5"  stroke="#333" stroke-width="0.8"/>
        <line x1="9" y1="1"  x2="12" y2="5" stroke="#333" stroke-width="0.8"/>
        <line x1="1" y1="9"  x2="5" y2="7"  stroke="#333" stroke-width="0.8"/>
        <line x1="17" y1="9" x2="13" y2="12" stroke="#333" stroke-width="0.8"/>
        <line x1="5"  y1="14" x2="7" y2="11" stroke="#333" stroke-width="0.8"/>
        <line x1="13" y1="14" x2="11" y2="11" stroke="#333" stroke-width="0.8"/>
      </svg>`;
    document.body.appendChild(hole);
    setTimeout(() => hole.remove(), 4000);

    // Sparks
    for (let i = 0; i < 8; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.style.left = x + 'px';
      spark.style.top  = y + 'px';
      const angle = (i / 8) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const dist  = 22 + Math.random() * 28;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const size = 2 + Math.random() * 3;
      const dur  = 300 + Math.random() * 200;
      spark.style.width  = size + 'px';
      spark.style.height = size + 'px';
      spark.style.background = Math.random() > 0.5 ? '#ff6600' : '#ffcc00';
      spark.style.transition = `transform ${dur}ms ease-out, opacity ${dur}ms ease-out`;
      document.body.appendChild(spark);
      // Force reflow then animate
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          spark.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
          spark.style.opacity = '0';
        });
      });
      setTimeout(() => spark.remove(), dur + 50);
    }
  }

  // ── COPY CA ──
  document.getElementById('caBox').addEventListener('click', () => {
    const addr = document.getElementById('caAddr').textContent.trim();
    (navigator.clipboard ? navigator.clipboard.writeText(addr) : fallbackCopy(addr))
      .then(() => showToast('ADDRESS COPIED  🔫'))
      .catch(() => showToast('ADDRESS COPIED  🔫'));
  });

  function fallbackCopy(text) {
    return new Promise(resolve => {
      const el = document.createElement('textarea');
      el.value = text;
      el.style.position = 'fixed'; el.style.opacity = '0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      el.remove();
      resolve();
    });
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1700);
  }

  // ── INFINITE CAROUSEL ──
  (function() {
    const wrap  = document.getElementById('carouselWrap');
    const track = document.getElementById('carouselTrack');
    const GAP   = parseInt(getComputedStyle(track).gap) || 20;
    const SPEED = 0.7;  // px per frame (auto-scroll)

    // Clone all cards for seamless loop
    const origCards = Array.from(track.children);
    origCards.forEach(c => track.appendChild(c.cloneNode(true)));
    origCards.forEach(c => track.appendChild(c.cloneNode(true)));

    let offset   = 0;
    let paused   = false;
    let dragging = false;
    let dragStartX = 0;
    let dragStartOffset = 0;
    let raf;

    function cardWidth() {
      return track.children[0].offsetWidth + GAP;
    }

    function halfLen() {
      // width of one full set of original cards
      return origCards.length * cardWidth();
    }

    function tick() {
      if (!paused && !dragging) {
        offset += SPEED;
      }
      // seamless reset — when we've scrolled one full copy, jump back
      const hl = halfLen();
      if (offset >= hl) offset -= hl;
      if (offset < 0)   offset += hl;

      track.style.transform = `translateX(${-offset}px)`;
      raf = requestAnimationFrame(tick);
    }

    raf = requestAnimationFrame(tick);

    // Pause on hover
    wrap.addEventListener('mouseenter', () => { paused = true; });
    wrap.addEventListener('mouseleave', () => { paused = false; });

    // Drag support
    wrap.addEventListener('mousedown', e => {
      dragging = true;
      dragStartX = e.clientX;
      dragStartOffset = offset;
      wrap.style.cursor = 'grabbing';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = dragStartX - e.clientX;
      offset = dragStartOffset + dx;
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      wrap.style.cursor = '';
      paused = false;
    });

    // Touch
    wrap.addEventListener('touchstart', e => {
      dragStartX = e.touches[0].clientX;
      dragStartOffset = offset;
      paused = true;
    }, { passive: true });
    wrap.addEventListener('touchmove', e => {
      const dx = dragStartX - e.touches[0].clientX;
      offset = dragStartOffset + dx;
    }, { passive: true });
    wrap.addEventListener('touchend', () => { paused = false; });

    // Arrow buttons — step by one card
    document.getElementById('arrowPrev').addEventListener('click', () => {
      offset -= cardWidth() * 2;
    });
    document.getElementById('arrowNext').addEventListener('click', () => {
      offset += cardWidth() * 2;
    });
  })();
</script>
</body>
</html>
